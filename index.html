<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnamese Identity Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .result-box { transition: all 0.2s ease; position: relative; overflow: hidden; }
        .result-box:active { transform: scale(0.97); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-pop { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl card w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-2 text-gray-800">Trình Tạo Identity</h1>
        <p class="text-gray-500 text-sm mb-8">Dữ liệu thuần Việt & Hiện đại</p>
        
        <div class="space-y-4">
            <div id="display-name" class="result-box p-4 bg-emerald-50 text-emerald-700 rounded-2xl text-xl font-semibold min-h-[64px] flex items-center justify-center border border-emerald-100 cursor-pointer hover:bg-emerald-100" onclick="copyText('display-name')">
                <span class="text-gray-300 font-normal">Chưa tạo tên</span>
            </div>
            
            <div id="display-user" class="result-box p-4 bg-rose-50 text-rose-700 rounded-2xl text-xl font-semibold min-h-[64px] flex items-center justify-center border border-rose-100 cursor-pointer hover:bg-rose-100" onclick="copyText('display-user')">
                <span class="text-gray-300 font-normal">Chưa tạo username</span>
            </div>

            <div class="pt-6">
                <button onclick="generateAll()" class="w-full bg-gray-800 hover:bg-black text-white py-4 rounded-2xl font-bold transition-all transform active:scale-95 shadow-xl mb-4">
                    ⚡ Tạo Tất Cả Mới
                </button>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="generateNewName()" class="bg-[#3EB489] hover:bg-[#349c77] text-white py-3 rounded-xl font-bold transition-all transform active:scale-95 shadow-lg shadow-emerald-100">
                        👤 Đổi Tên
                    </button>
                    <button onclick="generateNewUser()" class="bg-[#e74a3b] hover:bg-[#d13b2d] text-white py-3 rounded-xl font-bold transition-all transform active:scale-95 shadow-lg shadow-rose-100">
                        🆔 Đổi User
                    </button>
                </div>
            </div>
            
            <p class="text-gray-400 text-xs mt-6 uppercase tracking-widest">Chạm để sao chép</p>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-medium hidden shadow-2xl z-50"></div>

    <script>
        const dsHo = ["Nguyễn", "Trần", "Lê", "Phạm", "Hoàng", "Huỳnh", "Phan", "Vũ", "Võ", "Đặng", "Bùi", "Đỗ", "Hồ", "Ngô", "Dương", "Lý", "An", "Vương", "Trịnh", "Lương", "Mai", "Đào", "Đoàn", "Lâm", "Phùng", "Tống", "Trương", "Hứa", "Trình", "Tạ", "Hà", "Cao"];
        const dsDemNam = ["Văn", "Hữu", "Đức", "Minh", "Quang", "Anh", "Mạnh", "Trọng", "Thế", "Công", "Duy", "Hoàng", "Bảo", "Thành", "Quốc", "Phúc", "Tấn", "Nhật", "Đình", "Khắc", "Sĩ"];
        const dsDemNu = ["Thị", "Thanh", "Thu", "Ngọc", "Hồng", "Diệu", "Tuyết", "Mai", "Quỳnh", "Thảo", "Bích", "Kiều", "Phương", "Kim", "Như", "Minh", "Khánh", "Trúc", "Tú", "Ánh"];
        const dsTen = ["An", "Anh", "Bảo", "Bình", "Băng", "Bích", "Cường", "Chi", "Chinh", "Chấn", "Công", "Cảnh", "Cát", "Cầm", "Châu", "Chiêu", "Danh", "Diệp", "Dũng", "Dương", "Duy", "Duyên", "Diệu", "Đạt", "Đông", "Đức", "Đan", "Đình", "Đăng", "Đại", "Gia", "Giang", "Giao", "Hà", "Hải", "Hạnh", "Hào", "Hân", "Hiền", "Hiếu", "Hoa", "Hòa", "Hùng", "Huy", "Huyền", "Hương", "Hưng", "Hướng", "Hạ", "Kha", "Khang", "Khánh", "Khoa", "Khôi", "Kiên", "Kiệt", "Kiều", "Kỳ", "Khải", "Khiêm", "Khuê", "Lam", "Lâm", "Linh", "Lộc", "Long", "Lan", "Liên", "Liễu", "Lý", "Luân", "Lương", "Mai", "Minh", "Mỹ", "Mạnh", "Mẫn", "Mi", "My", "Nam", "Nga", "Ngân", "Nghĩa", "Nhân", "Nhi", "Nhung", "Nguyên", "Nguyệt", "Ngọc", "Nhàn", "Nhật", "Nhiên", "Phong", "Phú", "Phúc", "Phương", "Phượng", "Phát", "Phi", "Phước", "Quân", "Quang", "Quốc", "Quý", "Quỳnh", "Quyết", "Quyền", "Quế", "Sơn", "Sang", "Sáng", "Sinh", "Tâm", "Tấn", "Thắng", "Thành", "Thảo", "Thư", "Tiến", "Toàn", "Trang", "Triết", "Trí", "Trúc", "Trung", "Tú", "Tuấn", "Tùng", "Tường", "Tuyên", "Tuyết", "Thùy", "Thúy", "Thuận", "Thanh", "Thi", "Thịnh", "Thông", "Thái", "Thiện", "Uyên", "Uy", "Uyển", "Vinh", "Vượng", "Vy", "Vân", "Việt", "Vũ", "Văn", "Vi", "Viễn", "Xuân", "Xuyên", "Xuyến", "Yến", "Ý", "Yên", "Ân", "Ánh", "Tuệ", "Mẫn", "Khê", "Di", "Trâm", "Nhã", "Đan", "Tường", "Vỹ", "Bách", "Du", "Hy", "Trọng", "Hoàng", "Việt", "Sơn", "Tùng", "Bách", "Khang", "Tài", "Tín", "Vũ", "Phong", "Cẩm", "Nhung", "Gấm", "Vân", "Yên", "Hạ", "Thu", "Đông", "Khôi", "Vĩ", "Đăng", "Tuấn", "Kiệt", "Huy", "Khoa", "Long", "Phước", "Thịnh"];

        let currentFullName = "";

        function removeVietnameseTones(str) {
            return str.normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[đĐ]/g, 'd')
                .toLowerCase()
                .replace(/\s/g, '');
        }

        function generateAll() {
            generateNewName();
        }

        function generateNewName() {
            const ho = dsHo[Math.floor(Math.random() * dsHo.length)];
            const isNam = Math.random() > 0.5;
            const dem = isNam ? dsDemNam[Math.floor(Math.random() * dsDemNam.length)] : dsDemNu[Math.floor(Math.random() * dsDemNu.length)];
            
            let ten;
            do {
                ten = dsTen[Math.floor(Math.random() * dsTen.length)];
            } while (ten === dem);

            currentFullName = `${ho} ${dem} ${ten}`;
            const el = document.getElementById('display-name');
            el.innerText = currentFullName;
            el.classList.remove('animate-pop');
            void el.offsetWidth; // trigger reflow
            el.classList.add('animate-pop');
            
            generateNewUser();
        }

        function generateNewUser() {
            const namePart = currentFullName ? removeVietnameseTones(currentFullName) : "user";
            
            // Lấy 2 số cuối năm sinh & chuỗi ngẫu nhiên
            const yearShort = (Math.floor(Math.random() * (2006 - 1990 + 1)) + 1990).toString().substring(2);
            const rand = Math.random().toString(36).substring(2, 5); 
            const randLong = Math.random().toString(36).substring(2, 6);
            
            const formats = [
                () => namePart + yearShort + rand,           // nva03mks
                () => namePart + "." + yearShort + rand.slice(0,2), // nva.98jm
                () => rand + "." + namePart + yearShort,     // abc.nva01
                () => namePart + "_" + randLong,             // nva_x9k2
                () => namePart.slice(0,4) + "." + yearShort + rand // nvap.03jkl
            ];
            
            const username = formats[Math.floor(Math.random() * formats.length)]();
            const el = document.getElementById('display-user');
            el.innerText = username;
            el.classList.remove('animate-pop');
            void el.offsetWidth;
            el.classList.add('animate-pop');
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            if (text.includes("Chưa tạo")) return;
            
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.innerText = `Đã sao chép: ${text}`;
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 1500);
            });
        }
    </script>
</body>
</html>
